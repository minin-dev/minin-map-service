spring.application.name=InteractiveMap

server.port=${SERVER_PORT:8080}
api.base.path=${API_BASE_PATH:/api/v1}
app.mode=${MODE:dev}

spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost:5434}/${PG_DB:name_of_your_database}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${PG_USER:postgres}
spring.datasource.password=${PG_PASSWORD:your_secure_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

admin.username=${ADMIN_USER:admin}
admin.password=${ADMIN_PASSWORD:your_secure_admin_password}

spring.mvc.problemdetails.enabled=true
spring.web.resources.add-mappings=false

jwt.secret=${JWT_SECRET:your_secure_jwt_secret_key_32_characters_long}
jwt.expiration=${JWT_EXPIRE:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
